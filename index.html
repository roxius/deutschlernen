<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale/user-scalable: evita o zoom automático ao tocar/focar campos (Brave/Chrome) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="App de estudo de alemão A1.1 + A1.2 — Einfach gut! Deutsch für die Integration" />
  <title>Deutsch lernen · A1</title>
  <script>
    // Aplica tema e preferência de movimento antes do render (evita flash)
    (function () {
      try {
        var t = localStorage.getItem("deutschlernen.theme") || "light";
        var sys = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t === "system" ? sys : t);
        if (localStorage.getItem("deutschlernen.motion") === "reduced")
          document.documentElement.classList.add("reduce-motion");
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css?v=202607021200" />
</head>

  <script>
    // Offline/PWA cache desativado: o app sempre carrega da rede para evitar
    // versões presas em cache no celular. Removemos qualquer service worker
    // e cache que tenham ficado de versões anteriores.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(regs => regs.forEach(r => r.unregister()))
        .catch(() => {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
    }
  </script>
</body>
